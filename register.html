<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="login-box">

<div class="card p-4">

<h3 class="text-center">Create Account</h3>

<div id="registerMessage" class="alert d-none mb-3" role="alert"></div>

<form action="/register" method="POST">

<input class="form-control mb-3" name="username" placeholder="Username" required>

<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

<input class="form-control mb-3" name="plot" placeholder="Plot Number" required>

<button class="btn btn-success w-100">Register</button>

</form>

<p class="mt-3 text-center">
<a href="/login">Already have an account? Log in</a>
</p>

</div>

<script>
(function(){
var params = new URLSearchParams(window.location.search);
var error = params.get("error");
var el = document.getElementById("registerMessage");
if (error) {
  el.textContent = error;
  el.classList.add("alert-danger", "d-block");
  el.classList.remove("d-none");
}
})();
</script>

</div>

</body>

</html>
