<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="login-box">

<div class="card p-4">

<h3 class="text-center">SmartHub Login</h3>

<div id="loginMessage" class="alert d-none mb-3" role="alert"></div>

<form action="/login" method="POST">

<input class="form-control mb-3" name="username" placeholder="Username" required>

<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

<p class="mt-3 text-center">
<a href="/register">Create Account</a>
</p>

</div>

<script>
(function(){
var params = new URLSearchParams(window.location.search);
var error = params.get("error");
var registered = params.get("registered");
var el = document.getElementById("loginMessage");
if (error) {
  el.textContent = error;
  el.classList.add("alert-danger", "d-block");
  el.classList.remove("d-none");
} else if (registered) {
  el.textContent = "Account created. Please log in.";
  el.classList.add("alert-success", "d-block");
  el.classList.remove("d-none");
}
})();
</script>

</div>

</body>

</html>
